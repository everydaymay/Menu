<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 自助菜單編輯器</title>
    <style>
        /* 列印設定 */
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 0; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 10mm !important; }
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f0f0; margin: 0; padding: 20px; color: #000; }
        
        /* 編輯工具列 */
        .toolbar { background: #333; color: #fff; padding: 15px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-print { background: #27ae60; color: white; }
        .btn-add { background: #2980b9; color: white; font-size: 12px; }
        .btn-del { background: #e74c3c; color: white; font-size: 10px; padding: 2px 5px; }

        /* A4 紙張容器 */
        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 5mm 10mm; box-sizing: border-box; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .editable:hover { background: #ffffcc; outline: 1px dashed #999; }

        .main-grid { display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 10px; flex-grow: 1; }
        .section { border: 1px solid #000; margin-bottom: 10px; position: relative; }
        .section:hover .btn-add-row { display: block; }
        .section-title { background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td { border-bottom: 0.5px solid #eee; padding: 4px; vertical-align: middle; }
        
        /* 標籤對齊邏輯 */
        .price-col { display: flex; justify-content: flex-end; align-items: flex-end; gap: 2px; }
        .price-box { width: 38px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .box-square { width: 12px; height: 12px; border: 1px solid #000; display: inline-block; margin-right: 2px; }
        .label-top { font-size: 9px; font-weight: bold; margin-bottom: 2px; height: 12px; }

        .btn-add-row { position: absolute; right: -30px; top: 50%; display: none; background: #27ae60; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        
        footer { border-top: 2px solid #000; padding-top: 10px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <strong>美天早餐編輯模式：</strong>
    <span>直接點擊文字即可修改</span>
    <button class="btn btn-print" onclick="window.print()">確定無誤，準備列印</button>
    <button class="btn" onclick="location.reload()">重置 (放棄修改)</button>
</div>

<div class="a4-container">
    <header>
        <h1 contenteditable="true" class="editable">美天早餐 點菜單</h1>
        <div class="shop-info" contenteditable="true" class="editable">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
    </header>

    <div class="top-meta">
        <table style="border:1px solid #000; margin-bottom:10px;">
            <tr>
                <td contenteditable="true">內用桌號：_______</td>
                <td contenteditable="true"><span class="box-square"></span>外帶</td>
                <td style="text-align:right;" contenteditable="true">金額：________ 元</td>
            </tr>
        </table>
    </div>

    <div class="main-grid">
        <div class="col">
            <div class="section" id="sec-burger">
                <div class="section-title" contenteditable="true">漢堡 / 吐司 / 軟法 / 總匯</div>
                <table>
                    <tbody id="burger-body">
                        <tr>
                            <td contenteditable="true">煎蛋</td>
                            <td class="price-col">
                                <div class="price-box"><span class="label-top">吐司</span><div><span class="box-square"></span><span contenteditable="true">30</span></div></div>
                                <div class="price-box"><span class="label-top">漢堡</span><div><span class="box-square"></span><span contenteditable="true">35</span></div></div>
                                <div class="price-box"><span class="label-top">軟法</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                                <div class="price-box"><span class="label-top">總匯</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                                <button class="btn btn-del no-print" onclick="this.parentElement.parentElement.remove()">X</button>
                            </td>
                        </tr>
                        <script>
                            const items = ["肉鬆", "火腿", "培根", "起士", "薯餅", "肉排", "鮪魚", "香雞排", "里肌豬排"];
                            items.forEach(name => {
                                document.write(`<tr>
                                    <td contenteditable="true">${name}</td>
                                    <td class="price-col">
                                        <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">35</span></div></div>
                                        <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">40</span></div></div>
                                        <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">55</span></div></div>
                                        <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">55</span></div></div>
                                        <button class="btn btn-del no-print" onclick="this.parentElement.parentElement.remove()">X</button>
                                    </td>
                                </tr>`);
                            });
                        </script>
                    </tbody>
                </table>
                <button class="btn-add-row no-print" onclick="addBurgerRow()">+</button>
            </div>
        </div>

        <div class="col">
            <div class="section">
                <div class="section-title" contenteditable="true">蛋餅系列 (☐醬油 ☐辣椒)</div>
                <table id="egg-table">
                    <script>
                        const eggs = ["原味", "玉米", "九層塔", "起士", "肉鬆"];
                        eggs.forEach(name => {
                            document.write(`<tr>
                                <td contenteditable="true">${name}</td>
                                <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">35</span>
                                <button class="btn btn-del no-print" onclick="this.parentElement.parentElement.remove()">X</button></td>
                            </tr>`);
                        });
                    </script>
                </table>
                <button class="btn-add-row no-print" onclick="addRow('egg-table')">+</button>
            </div>
            
            <div class="section">
                <div class="section-title" contenteditable="true">中式 / 乳酪餅</div>
                <table id="chinese-table">
                    <tr><td contenteditable="true">荷包蛋(全/半)</td><td style="text-align:right;"><span class="box-square"></span>15</td></tr>
                    <tr><td contenteditable="true">乳酪餅+蛋</td><td style="text-align:right;"><span class="box-square"></span>45</td></tr>
                </table>
                <button class="btn-add-row no-print" onclick="addRow('chinese-table')">+</button>
            </div>
        </div>

        <div class="col">
            <div class="section">
                <div class="section-title" contenteditable="true">飲料系列 (☐中 ☐大)</div>
                <table id="drink-table">
                    <tr>
                        <td contenteditable="true">紅茶</td>
                        <td class="price-col">
                            <div class="price-box"><span class="label-top">中</span><div><span class="box-square"></span>15</div></div>
                            <div class="price-box"><span class="label-top">大</span><div><span class="box-square"></span>20</div></div>
                        </td>
                    </tr>
                </table>
                <button class="btn-add-row no-print" onclick="addDrinkRow()">+</button>
            </div>
            
            <div class="section">
                <div class="section-title" contenteditable="true">炸物小點</div>
                <table id="snack-table">
                    <tr><td contenteditable="true">雞塊 / 薯條</td><td style="text-align:right;"><span class="box-square"></span>40</td></tr>
                </table>
                <button class="btn-add-row no-print" onclick="addRow('snack-table')">+</button>
            </div>
        </div>
    </div>

    <footer contenteditable="true">
        加起司+10 | 吐司漢堡均加蛋，不加蛋折5 | 餐點現做請耐心等候，謝謝您
    </footer>
</div>

<script>
    function addBurgerRow() {
        const body = document.getElementById('burger-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td contenteditable="true">新項目</td><td class="price-col">
            <div class="price-box"><span class="box-square"></span><span contenteditable="true">0</span></div>
            <div class="price-box"><span class="box-square"></span><span contenteditable="true">0</span></div>
            <div class="price-box"><span class="box-square"></span><span contenteditable="true">0</span></div>
            <div class="price-box"><span class="box-square"></span><span contenteditable="true">0</span></div>
            <button class="btn btn-del no-print" onclick="this.parentElement.parentElement.remove()">X</button>
        </td>`;
        body.appendChild(tr);
    }

    function addRow(tableId) {
        const table = document.getElementById(tableId);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td contenteditable="true">新品項</td><td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span>
        <button class="btn btn-del no-print" onclick="this.parentElement.parentElement.remove()">X</button></td>`;
        table.appendChild(tr);
    }
</script>

</body>
</html>
