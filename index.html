<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 田字格旗艦版</title>
    <style id="font-style">body { font-family: "Microsoft JhengHei", sans-serif; }</style>
    <style>
        @media print {
            .no-print, .controls, .toolbar { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 8mm !important; }
            .section { page-break-inside: avoid; border: 1.5px solid #000 !important; overflow: visible !important; resize: none !important; }
            table { border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; }
        }

        body { background: #dfe6e9; margin: 0; padding: 20px; color: #000; }
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 8px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 8mm 10mm; box-sizing: border-box; border: 1px solid #ccc; display: flex; flex-direction: column; }
        
        header { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px; }
        .header-info-bar { display: flex; justify-content: space-between; border: 1px solid #000; margin-top: 5px; padding: 5px 10px; font-weight: bold; font-size: 14px; }
        .underline { border-bottom: 1px solid #000; min-width: 45px; display: inline-block; text-align: center; margin: 0 5px; outline: none; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; gap: 10px; min-height: 100px; }

        /* 區塊與田字格設定 */
        .section { border: 1.5px solid #000; margin-bottom: 10px; border-radius: 2px; position: relative; background: #fff; overflow: hidden; resize: both; }
        .section-title { background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; font-size: 14px; }
        .price-align-header { background-color: #f2f2f2; border-bottom: 1.5px solid #000; padding: 4px 10px; font-size: 11px; font-weight: bold; min-height: 1.2em; outline: none; }

        .controls { background: #eee; padding: 4px; display: flex; gap: 2px; border-bottom: 1px solid #ccc; flex-wrap: wrap; justify-content: center; }
        .btn-move { background: #636e72; color: white; font-size: 10px; padding: 2px 4px; border: none; cursor: pointer; border-radius: 3px; }
        .btn-edit { font-size: 10px; padding: 2px 5px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 3px; }
        .btn-bold { font-weight: 900; background: #2d3436; color: #fff; }

        /* 田字格表格核心 CSS */
        table { width: 100%; border-collapse: collapse; font-size: 11px; border: none; }
        td { border: 1px solid #000; padding: 4px 3px; vertical-align: middle; }
        .price-align-row { padding: 0 !important; display: flex; height: 100%; border: none; }
        .box-cell { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-left: 1px solid #000; 
            height: 28px; 
            min-width: 38px;
        }
        .box-cell:first-child { border-left: none; }
        .box-square { width: 12px; height: 12px; border: 1px solid #000; display: inline-block; margin-right: 2px; }

        /* 黃色客製框 */
        .custom-box { background: #fff9c4 !important; border: 1.5px solid #000; border-radius: 10px; padding: 8px; resize: both; overflow: auto; }
        .custom-title { color: #d32f2f; font-weight: bold; text-align: center; font-size: 12px; margin-bottom: 5px; }
        .custom-content { display: flex; justify-content: space-around; font-size: 11px; line-height: 1.6; }

        footer { border-top: 2px solid #000; padding-top: 8px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
        .del-x { color: red; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 新增一般區塊</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存菜單</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 直接列印</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="font-size:24px; font-weight:bold;" contenteditable="true">美天早餐 點菜單</div>
            <div style="font-size:11px;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
        </div>
        <div class="header-info-bar">
            <div>內用桌號：<span class="underline" contenteditable="true"></span></div>
            <div><span class="box-square"></span> 外帶</div>
            <div>金額：<span class="underline" contenteditable="true"></span> 元</div>
        </div>
    </header>

    <div class="main-grid">
        <div class="col" id="col-0">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button>
                    <button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button>
                    <button class="btn-edit" onclick="pickColor(this, '.section-title')">🎨主標</button>
                    <button class="btn-edit" onclick="pickColor(this, '.price-align-header')">🎨子標</button>
                    <button class="btn-edit" onclick="changeFontSize(this, 1)">➕大</button>
                    <button class="btn-edit btn-bold" onclick="toggleBold(this)">𝐁</button>
                    <button class="btn-edit" onclick="addRow(this, 4)">➕4價</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="section-title" contenteditable="true">漢堡 / 吐司 / 軟法 / 總匯</div>
                <div class="price-align-header" contenteditable="true">品項名稱　　　　　　　　　　吐司　漢堡　軟法　總匯</div>
                <table>
                    <tbody>
                        <tr>
                            <td><button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">煎蛋</span></td>
                            <td class="price-align-row">
                                <div class="box-cell"><span class="box-square"></span><span contenteditable="true">30</span></div>
                                <div class="box-cell"><span class="box-square"></span><span contenteditable="true">35</span></div>
                                <div class="box-cell"><span class="box-square"></span><span contenteditable="true">50</span></div>
                                <div class="box-cell"><span class="box-square"></span><span contenteditable="true">50</span></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col" id="col-1"></div>
        <div class="col" id="col-2">
            <div class="section custom-box">
                <div class="controls no-print">
                    <button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button>
                    <button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button>
                    <button class="btn-edit btn-bold" onclick="toggleBold(this)">𝐁</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="custom-title" contenteditable="true">不加請打勾</div>
                <div class="custom-content">
                    <div contenteditable="true">
                        吐司：<br>
                        <span class="box-square"></span>沙拉<br>
                        <span class="box-square"></span>小黃瓜<br>
                        <span class="box-square"></span>胡椒粉
                    </div>
                    <div contenteditable="true">
                        漢堡：<br>
                        <span class="box-square"></span>沙拉 <span class="box-square"></span>生菜<br>
                        <span class="box-square"></span>洋蔥 <span class="box-square"></span>番茄醬<br>
                        <span class="box-square"></span>番茄片 <span class="box-square"></span>胡椒粉
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer contenteditable="true">加起司+10 | 吐司漢堡均加蛋，不加蛋折5 | 餐點現做請耐心等候</footer>
</div>

<script>
    window.onload = function() {
        const saved = localStorage.getItem('breakfast_final_grid_v9');
        if (saved) document.getElementById('menu-content').innerHTML = saved;
    };

    function saveMenu() {
        localStorage.setItem('breakfast_final_grid_v9', document.getElementById('menu-content').innerHTML);
        alert('✅ 已儲存！');
    }

    function toggleBold(btn) {
        const section = btn.closest('.section');
        section.style.fontWeight = (section.style.fontWeight === '900') ? 'normal' : '900';
    }

    function changeFontSize(btn, delta) {
        const section = btn.closest('.section');
        const elements = section.querySelectorAll('table, td, .price-align-header, .section-title, span, div');
        elements.forEach(el => {
            const curSize = parseFloat(window.getComputedStyle(el).fontSize);
            if(curSize) el.style.fontSize = (curSize + delta) + 'px';
        });
    }

    function pickColor(btn, selector) {
        const target = btn.closest('.section').querySelector(selector);
        const color = prompt("輸入顏色代碼 (如 red, #333, #f2f2f2):", "gray");
        if (color) {
            target.style.backgroundColor = color;
            if(selector === '.section-title') target.style.color = (color === 'white' || color === '#ffffff') ? 'black' : 'white';
        }
    }

    function move(btn, dir) {
        const sec = btn.closest('.section');
        const colId = parseInt(sec.parentElement.id.replace('col-', ''));
        if (dir === 'up' && sec.previousElementSibling) sec.parentElement.insertBefore(sec, sec.previousElementSibling);
        else if (dir === 'down' && sec.nextElementSibling) sec.parentElement.insertBefore(sec.nextElementSibling, sec);
        else if (dir === 'left') document.getElementById('col-' + ((colId + 2) % 3)).appendChild(sec);
        else if (dir === 'right') document.getElementById('col-' + ((colId + 1) % 3)).appendChild(sec);
    }

    function addRow(btn, count) {
        const tbody = btn.closest('.section').querySelector('tbody');
        const tr = document.createElement('tr');
        let cells = '';
        for(let i=0; i<count; i++) cells += `<div class="box-cell"><span class="box-square"></span><span contenteditable="true">0</span></div>`;
        tr.innerHTML = `<td><button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">品項</span></td><td class="price-align-row">${cells}</td>`;
        tbody.appendChild(tr);
    }

    function addNewSection() {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `<div class="controls no-print"><button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button><button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button><button class="btn-edit" onclick="pickColor(this,'.section-title')">🎨主</button><button class="btn-edit" onclick="pickColor(this,'.price-align-header')">🎨子</button><button class="btn-edit btn-bold" onclick="toggleBold(this)">𝐁</button><button class="btn-edit" onclick="addRow(this, 1)">➕1價</button><button class="btn-edit" onclick="addRow(this, 2)">➕2價</button><button class="btn-edit" onclick="addRow(this, 4)">➕4價</button><button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button></div><div class="section-title" contenteditable="true">新類別</div><div class="price-align-header" contenteditable="true">品項名稱　單價</div><table><tbody></tbody></table>`;
        document.getElementById('col-0').appendChild(div);
        addRow(div.querySelector('.btn-edit'), 1);
    }
</script>
</body>
</html>
