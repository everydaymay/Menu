<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 旗艦版菜單編輯器</title>
    <style>
        @media print {
            .no-print, .controls, .toolbar { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 10mm !important; }
            .section { page-break-inside: avoid; }
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #dfe6e9; margin: 0; padding: 20px; color: #000; }
        
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 8px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-wrap: wrap; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }
        .btn-reset { background: #b2bec3; color: #2d3436; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 80px auto; padding: 8mm 10mm; box-sizing: border-box; border: 1px solid #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        
        .main-grid { display: grid; grid-template-columns: 1.1fr 0.95fr 0.95fr; gap: 12px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; min-height: 50px; border: 1px dashed #eee; padding: 2px; }

        .section { border: 1px solid #000; margin-bottom: 12px; border-radius: 2px; position: relative; }
        .section-title { background: #000; color: #fff; padding: 6px; font-weight: bold; text-align: center; font-size: 13px; }
        
        .controls { background: #f1f2f6; padding: 4px; display: flex; gap: 4px; border-bottom: 1px solid #ccc; flex-wrap: wrap; justify-content: center; }
        .btn-edit { font-size: 11px; padding: 2px 6px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 3px; }
        .btn-del-item { background: #ff7675; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 0 5px; margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td { border-bottom: 1px solid #f0f0f0; padding: 5px 3px; vertical-align: middle; }
        
        .box-square { width: 12px; height: 12px; border: 1px solid #000; display: inline-block; vertical-align: middle; margin-right: 2px; }
        .price-col { display: flex; justify-content: flex-end; align-items: flex-end; gap: 2px; }
        .price-box { width: 36px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .label-top { font-size: 9px; font-weight: bold; margin-bottom: 2px; opacity: 0.8; }

        .tag-btn { background: #eee; border: 1px solid #ccc; font-size: 10px; padding: 1px 4px; cursor: pointer; margin-left: 3px; border-radius: 2px; }
        .tag-btn:hover { background: #ddd; }

        footer { border-top: 2px solid #000; padding-top: 10px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 新增類別區塊</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存菜單</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 列印菜單</button>
    <button class="btn btn-reset" onclick="resetMenu()">🔄 恢復初始</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <h1 contenteditable="true">美天早餐 點菜單</h1>
        <div style="font-size: 11px; text-align: right;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
    </header>

    <div class="main-grid">
        <div class="col" id="col-0">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="moveSection(this, 1)">➡️右移</button>
                    <button class="btn-edit" onclick="changeColor(this)">🎨顏色</button>
                    <button class="btn-edit" onclick="addRow(this, 4)">➕四價行(漢堡)</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕刪除區</button>
                </div>
                <div class="section-title" contenteditable="true">吐司 / 漢堡 / 軟法 / 總匯</div>
                <table><tbody>
                    <tr>
                        <td><button class="no-print btn-del-item" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">煎蛋</span></td>
                        <td class="price-col">
                            <div class="price-box"><span class="label-top" contenteditable="true">吐司</span><div><span class="box-square"></span><span contenteditable="true">30</span></div></div>
                            <div class="price-box"><span class="label-top" contenteditable="true">漢堡</span><div><span class="box-square"></span><span contenteditable="true">35</span></div></div>
                            <div class="price-box"><span class="label-top" contenteditable="true">軟法</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                            <div class="price-box"><span class="label-top" contenteditable="true">總匯</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                        </td>
                    </tr>
                </tbody></table>
            </div>
        </div>
        
        <div class="col" id="col-1">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="moveSection(this, -1)">⬅️左移</button>
                    <button class="btn-edit" onclick="moveSection(this, 1)">➡️右移</button>
                    <button class="btn-edit" onclick="addRow(this, 2)">➕雙價行(飲料)</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕刪除區</button>
                </div>
                <div class="section-title" contenteditable="true">飲料系列 (☐冰 ☐溫 ☐熱)</div>
                <table><tbody>
                    <tr>
                        <td><button class="no-print btn-del-item" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">紅茶</span></td>
                        <td class="price-col">
                            <div class="price-box"><span class="label-top" contenteditable="true">中</span><div><span class="box-square"></span><span contenteditable="true">15</span></div></div>
                            <div class="price-box"><span class="label-top" contenteditable="true">大</span><div><span class="box-square"></span><span contenteditable="true">20</span></div></div>
                        </td>
                    </tr>
                </tbody></table>
            </div>
        </div>

        <div class="col" id="col-2">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="moveSection(this, -1)">⬅️左移</button>
                    <button class="btn-edit" onclick="addRow(this, 1)">➕單價行</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕刪除區</button>
                </div>
                <div class="section-title" contenteditable="true">中式輕食 (點按鈕加選項👇)</div>
                <table><tbody id="chinese-body">
                    <tr>
                        <td>
                            <button class="no-print btn-del-item" onclick="this.closest('tr').remove()">✕</button>
                            <span contenteditable="true">荷包蛋</span>
                            <button class="tag-btn no-print" onclick="addTag(this, '(全/半熟)')">🍳蛋</button>
                        </td>
                        <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">15</span></td>
                    </tr>
                </tbody></table>
            </div>
        </div>
    </div>

    <footer contenteditable="true">
        加起司+10 | 吐司漢堡均加蛋，不加蛋折5 | 餐點現做請耐心等候，謝謝您
    </footer>
</div>

<script>
    window.onload = function() {
        const saved = localStorage.getItem('ultraMenuData');
        if (saved) document.getElementById('menu-content').innerHTML = saved;
    };

    function saveMenu() {
        localStorage.setItem('ultraMenuData', document.getElementById('menu-content').innerHTML);
        alert('✅ 菜單已存檔！');
    }

    function resetMenu() {
        if(confirm('確定清除所有內容恢復預設嗎？')) { localStorage.removeItem('ultraMenuData'); location.reload(); }
    }

    function addTag(btn, text) {
        const span = btn.parentElement.querySelector('span[contenteditable="true"]');
        span.innerText += ' ' + text;
    }

    function addNewSection() {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `
            <div class="controls no-print">
                <button class="btn-edit" onclick="moveSection(this, -1)">⬅️</button>
                <button class="btn-edit" onclick="moveSection(this, 1)">➡️</button>
                <button class="btn-edit" onclick="addRow(this, 1)">➕1價</button>
                <button class="btn-edit" onclick="addRow(this, 2)">➕2價</button>
                <button class="btn-edit" onclick="changeColor(this)">🎨</button>
                <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
            </div>
            <div class="section-title" contenteditable="true">新區塊</div>
            <table><tbody><tr>
                <td><button class="no-print btn-del-item" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">品項</span></td>
                <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span></td>
            </tr></tbody></table>`;
        document.getElementById('col-0').appendChild(div);
    }

    function addRow(btn, type) {
        const tbody = btn.closest('.section').querySelector('tbody');
        const tr = document.createElement('tr');
        let content = `<td><button class="no-print btn-del-item" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">新項目</span>`;
        
        // 加入快捷按鈕
        content += `<button class="tag-btn no-print" onclick="addTag(this, '(全/半熟)')">🍳</button>`;
        content += `<button class="tag-btn no-print" onclick="addTag(this, '(醬油/辣椒)')">🌶️</button>`;
        content += `</td>`;

        if(type === 4) {
            content += `<td class="price-col">
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
            </td>`;
        } else if(type === 2) {
            content += `<td class="price-col">
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
            </td>`;
        } else {
            content += `<td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span></td>`;
        }
        tr.innerHTML = content;
        tbody.appendChild(tr);
    }

    function moveSection(btn, dir) {
        const sec = btn.closest('.section');
        const colId = parseInt(sec.parentElement.id.replace('col-', ''));
        const nextId = (colId + dir + 3) % 3;
        document.getElementById('col-' + nextId).appendChild(sec);
    }

    function changeColor(btn) {
        const title = btn.closest('.section').querySelector('.section-title');
        const c = prompt("請輸入顏色名稱或代碼 (如 red, blue, #333):", "black");
        if(c) title.style.backgroundColor = c;
    }
</script>

</body>
</html>
