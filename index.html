<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 完美對齊最終版</title>
    <style id="font-style">body { font-family: "Microsoft JhengHei", sans-serif; }</style>
    <style>
        /* 列印專屬設定：消除白邊與多餘按鈕 */
        @media print {
            .no-print, .controls, .toolbar, .del-cell { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 8mm !important; }
            
            /* 列印時強制區塊只包覆內容，絕對不留空白 */
            .section { page-break-inside: avoid; border: 1px solid #000 !important; resize: none !important; height: max-content !important; }
            table { border-collapse: collapse !important; border: none !important; margin: 0 !important; }
            td, th { border: 1px solid #000 !important; }
            table tr td:first-child, table tr th:first-child { border-left: none !important; }
            table tr td:last-child, table tr th:last-child { border-right: none !important; }
            table tr:last-child td { border-bottom: none !important; }
            table tr:first-child th { border-top: none !important; }
        }

        body { background: #dfe6e9; margin: 0; padding: 20px; color: #000; }
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 8px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-wrap: wrap; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }
        .btn-add-box { background: #e84393; color: white; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 8mm 10mm; box-sizing: border-box; border: 1px solid #ccc; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px; }
        .header-info-bar { display: flex; justify-content: space-between; border: 1px solid #000; margin-top: 5px; padding: 5px 10px; font-weight: bold; font-size: 14px; }
        .underline { border-bottom: 1px solid #000; min-width: 45px; display: inline-block; text-align: center; margin: 0 5px; outline: none; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; gap: 10px; }

        /* 🌟 區塊核心修正：禁止上下拖拉，強制高度服貼 */
        .section { 
            border: 1px solid #000; 
            margin-bottom: 10px; 
            border-radius: 2px; 
            position: relative; 
            background: #fff; 
            overflow: hidden; 
            resize: horizontal; 
            min-width: 150px;
            height: max-content !important; 
        }
        .section-title { background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; font-size: 14px; }
        
        .controls { background: #eee; padding: 4px; display: flex; gap: 2px; border-bottom: 1px solid #ccc; flex-wrap: wrap; justify-content: center; }
        .btn-move { background: #636e72; color: white; font-size: 10px; padding: 2px 4px; border: none; cursor: pointer; border-radius: 3px; }
        .btn-edit { font-size: 10px; padding: 2px 4px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 3px; }
        .btn-bold { font-weight: 900; background: #2d3436; color: #fff; }

        /* 表格與標題列完美對齊 CSS */
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; border: none; margin: 0; padding: 0; }
        td, th { border: 1px solid #000; padding: 5px 2px; vertical-align: middle; text-align: center; position: relative; font-weight: normal; }
        th { font-weight: bold; } 
        table tr td:first-child, table tr th:first-child { border-left: none !important; }
        table tr td:last-child, table tr th:last-child { border-right: none !important; }
        table tr:last-child td { border-bottom: none !important; }
        table tr:first-child th { border-top: none !important; }
        
        .item-name-td { width: 40%; text-align: left; padding-left: 5px; }
        
        /* 完美方框 (CSS 畫圖版) */
        .box-square { 
            width: 13px; 
            height: 13px; 
            border: 1px solid #000; 
            display: inline-block; 
            vertical-align: middle; 
            margin-right: 3px; 
            background-color: #fff;
            transform: translateY(-1px);
        }
        
        .del-x { color: red; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 14px; margin-right: 2px; }
        .del-cell { position: absolute; top: 0px; right: 0px; color: #bbb; font-size: 9px; cursor: pointer; padding: 2px; line-height: 1; font-weight: normal; }
        .del-cell:hover { color: red; }

        .custom-box { background: #fff9c4 !important; border: 1px solid #000; border-radius: 8px; padding: 8px; resize: horizontal; overflow: hidden; height: max-content !important; }
        .custom-title { color: #d32f2f; font-weight: bold; text-align: center; font-size: 12px; margin-bottom: 5px; }
        .custom-item { display: inline-block; margin-right: 5px; margin-bottom: 3px; white-space: nowrap; }

        footer { border-top: 2px solid #000; padding-top: 8px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 新增區塊</button>
    <button class="btn btn-add-box" onclick="insertCheckbox()">➕ 插入方框</button>
    <button class="btn" style="background:#9b59b6; color:white;" onclick="shrinkText()">🔽 選取字變小</button>
    <button class="btn" style="background:#7f8c8d; color:white;" onclick="resetText()">🔼 恢復大小</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存存檔</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 直接列印</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="font-size:24px; font-weight:bold;" contenteditable="true">美天早餐 點菜單</div>
            <div style="font-size:11px;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
        </div>
        <div class="header-info-bar">
            <div>內用桌號：<span class="underline" contenteditable="true"></span></div>
            <div><span class="box-square"></span> 外帶</div>
            <div>金額：<span class="underline" contenteditable="true"></span> 元</div>
        </div>
    </header>

    <div class="main-grid" id="main-grid">
        </div>
</div>

<script>
    window.onload = function() {
        // 💡 讀取您最珍貴的存檔資料
        const saved = localStorage.getItem('breakfast_final_v23') || localStorage.getItem('breakfast_final_v22');
        if (saved) {
            document.getElementById('menu-content').innerHTML = saved;
            
            // 🔥 超級暴力清洗程式：抓出所有舊版的獨立灰底標題，強制塞入表格對齊 🔥
            document.querySelectorAll('.section:not(.custom-box)').forEach(sec => {
                let oldHead = sec.querySelector('div.price-align-header'); 
                let table = sec.querySelector('table');
                
                // 如果有找到舊的標題，且表格還沒有 thead，就進行轉換
                if (oldHead && table && !table.querySelector('thead')) {
                    let clone = oldHead.cloneNode(true);
                    let btn = clone.querySelector('button');
                    if(btn) btn.remove();
                    
                    // 用最強力的方式拆解文字
                    let rawText = clone.innerText.replace(/&nbsp;/g, ' ').replace(/\n/g, ' ').trim();
                    let parts = rawText.split(/[\s\u3000]+/); 
                    
                    let title = parts[0] || '品項名稱';
                    let prices = parts.slice(1);
                    let cols = parseInt(table.dataset.cols || 1);

                    // 建立全新的對齊標題列
                    let thead = document.createElement('thead');
                    let tr = document.createElement('tr');
                    tr.className = 'price-align-header';
                    tr.style.backgroundColor = oldHead.style.backgroundColor || '#f2f2f2';
                    tr.style.color = oldHead.style.color || 'black';

                    let th1 = document.createElement('th');
                    th1.className = 'item-name-td';
                    th1.style.textAlign = 'left';
                    th1.innerHTML = `<button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">${title}</span>`;
                    tr.appendChild(th1);

                    for(let i=0; i<cols; i++) {
                        let th = document.createElement('th');
                        th.innerHTML = `<span contenteditable="true">${prices[i] || '單價'}</span>`;
                        tr.appendChild(th);
                    }
                    
                    thead.appendChild(tr);
                    table.insertBefore(thead, table.firstChild);
                    
                    // 徹底刪除舊的歪歪標題
                    oldHead.remove();
                }
            });

            // 清除殘留白邊
            document.querySelectorAll('.section, .custom-box').forEach(el => {
                el.style.height = ''; 
            });
        }
    };

    function saveMenu() {
        document.querySelectorAll('.section, .custom-box').forEach(el => el.style.height = '');
        localStorage.setItem('breakfast_final_v23', document.getElementById('menu-content').innerHTML);
        alert('✅ 儲存成功！排版已完美對齊並鎖定。');
    }

    function shrinkText() {
        document.execCommand('fontSize', false, '1');
        document.querySelectorAll('font[size="1"]').forEach(f => {
            let s = document.createElement('span');
            s.style.fontSize = '0.75em';
            s.style.color = '#555'; 
            s.innerHTML = f.innerHTML;
            f.replaceWith(s);
        });
    }

    function resetText() {
        document.execCommand('fontSize', false, '3');
        document.querySelectorAll('font[size="3"]').forEach(f => {
            let s = document.createElement('span');
            s.style.fontSize = '1em';
            s.style.color = '#000';
            s.innerHTML = f.innerHTML;
            f.replaceWith(s);
        });
    }

    function insertCheckbox() {
        document.execCommand('insertHTML', false, '<span class="box-square"></span>&nbsp;');
    }

    function toggleBold(btn) {
        const section = btn.closest('.section');
        section.style.fontWeight = (section.style.fontWeight === '900') ? 'normal' : '900';
    }

    function changeFontSize(btn, delta) {
        const section = btn.closest('.section');
        const allText = section.querySelectorAll('table, th, td, .section-title, span:not(.box-square), div, b');
        allText.forEach(el => {
            const cur = parseFloat(window.getComputedStyle(el).fontSize);
            if(cur) el.style.fontSize = (cur + delta) + 'px';
        });
        const allBoxes = section.querySelectorAll('.box-square');
        allBoxes.forEach(box => {
            const curW = parseFloat(window.getComputedStyle(box).width);
            box.style.width = (curW + delta) + 'px';
            box.style.height = (curW + delta) + 'px';
        });
    }

    function pickColorAdvanced(btn, selector) {
        let target = btn.closest('.section').querySelector(selector);
        if (selector === '.price-align-header') {
            target = btn.closest('.section').querySelector('thead tr.price-align-header') || target;
        }
        if(!target) return alert("目標已刪除。");
        
        const bgColor = prompt("1. 請輸入【背景顏色】 (例如: pink, #ffcccc, black, gray):", "black");
        if (bgColor) {
            target.style.setProperty('background-color', bgColor, 'important');
            const textColor = prompt("2. 請輸入【文字顏色】 (例如: white, #ffffff, black):", "white");
            if (textColor) {
                target.style.setProperty('color', textColor, 'important');
            }
        }
    }

    function move(btn, dir) {
        const sec = btn.closest('.section');
        const colId = parseInt(sec.parentElement.id.replace('col-', ''));
        if (dir === 'up' && sec.previousElementSibling) sec.parentElement.insertBefore(sec, sec.previousElementSibling);
        else if (dir === 'down' && sec.nextElementSibling) sec.parentElement.insertBefore(sec.nextElementSibling, sec);
        else if (dir === 'left') document.getElementById('col-' + ((colId + 2) % 3)).appendChild(sec);
        else if (dir === 'right') document.getElementById('col-' + ((colId + 1) % 3)).appendChild(sec);
    }

    function setColumns(btn, count) {
        const section = btn.closest('.section');
        const table = section.querySelector('table');
        table.dataset.cols = count;

        let thead = table.querySelector('thead');
        if (thead) {
            let tr = thead.querySelector('tr');
            let ths = tr.querySelectorAll('th');
            let firstTh = ths[0]; 
            
            let existingPrices = [];
            for(let i=1; i<ths.length; i++) existingPrices.push(ths[i].querySelector('span').innerText);
            
            tr.innerHTML = '';
            tr.appendChild(firstTh);
            
            for(let i=0; i<count; i++) {
                let th = document.createElement('th');
                th.innerHTML = `<span contenteditable="true">${existingPrices[i] || '單價'}</span>`;
                tr.appendChild(th);
            }
        }

        table.querySelector('tbody').innerHTML = ''; 
        addRow(btn);
    }

    function addRow(btn) {
        const section = btn.closest('.section');
        const table = section.querySelector('table');
        const count = parseInt(table.dataset.cols || 1);
        const tr = document.createElement('tr');
        
        let html = `<td class="item-name-td"><button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">品項</span></td>`;
        for(let i=0; i<count; i++) {
            html += `<td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>`;
        }
        tr.innerHTML = html;
        table.querySelector('tbody').appendChild(tr);
    }

    function addNewSection() {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `
            <div class="controls no-print">
                <button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button>
                <button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button>
                <button class="btn-edit" onclick="pickColorAdvanced(this,'.section-title')">🎨主</button>
                <button class="btn-edit" onclick="pickColorAdvanced(this,'.price-align-header')">🎨子</button>
                <button class="btn-edit" onclick="changeFontSize(this, 1)">➕</button><button class="btn-edit" onclick="changeFontSize(this, -1)">➖</button>
                <button class="btn-edit btn-bold" onclick="toggleBold(this)">𝐁</button>
                <button class="btn-edit" onclick="setColumns(this, 1)">➕1價</button>
                <button class="btn-edit" onclick="setColumns(this, 2)">➕2價</button>
                <button class="btn-edit" onclick="setColumns(this, 3)">➕3價</button>
                <button class="btn-edit" onclick="setColumns(this, 4)">➕4價</button>
                <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
            </div>
            <div class="section-title" contenteditable="true" style="background-color:black; color:white;">新類別</div>
            <table data-cols="1">
                <thead>
                    <tr class="price-align-header" style="background-color:#f2f2f2; color:black;">
                        <th class="item-name-td" style="text-align: left;">
                            <button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">品項名稱</span>
                        </th>
                        <th><span contenteditable="true">單價</span></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn-edit no-print" style="width:100%; border:none; background:#f9f9f9; padding:4px;" onclick="addRow(this)">➕ 新增一行</button>`;
        document.getElementById('col-0').appendChild(div);
        addRow(div.querySelector('.btn-edit'));
    }
</script>
</body>
</html>
