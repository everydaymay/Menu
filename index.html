<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 菜單設計大師</title>
    <style>
        @media print {
            .no-print, .controls, .btn-edit, .toolbar { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 8mm !important; }
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #dfe6e9; margin: 0; padding: 20px; color: #000; }
        
        /* 頂部控制列 */
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 10px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }
        .btn-reset { background: #b2bec3; color: #2d3436; }

        /* A4 紙張容器 */
        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 8mm 10mm; box-sizing: border-box; border: 1px solid #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        
        /* 三欄佈局 */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; min-height: 50px; border: 1px dashed #eee; padding: 2px; }

        /* 區塊樣式 */
        .section { border: 1px solid #000; margin-bottom: 10px; border-radius: 2px; position: relative; }
        .section-title { 
            background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; 
            font-size: 13px; cursor: pointer; position: relative;
        }
        
        /* 控制按鈕 */
        .controls { background: #f1f2f6; padding: 2px; display: flex; gap: 2px; border-bottom: 1px solid #ccc; }
        .btn-edit { font-size: 10px; padding: 2px 4px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
        .btn-del-sec { background: #ff7675; color: white; position: absolute; right: 0; top: -25px; }

        table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
        td { border-bottom: 1px solid #f0f0f0; padding: 4px 2px; }
        
        .box-square { width: 11px; height: 11px; border: 1px solid #000; display: inline-block; vertical-align: middle; margin-right: 2px; }
        .price-col { display: flex; justify-content: flex-end; align-items: flex-end; gap: 2px; }
        .price-box { width: 34px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .label-top { font-size: 8px; font-weight: bold; margin-bottom: 1px; color: inherit; opacity: 0.7; }

        footer { border-top: 2px solid #000; padding-top: 10px; margin-top: auto; font-size: 11px; text-align: center; font-weight: bold; }

        /* 顏色選擇器隱藏樣式 */
        .color-picker { vertical-align: middle; width: 20px; height: 20px; padding: 0; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 新增類別區塊</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存所有變更</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 直接列印</button>
    <button class="btn btn-reset" onclick="resetMenu()">🔄 恢復預設</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <h1 contenteditable="true" style="font-size: 24px; color: #000;">美天早餐 點菜單</h1>
        <div style="font-size: 11px; text-align: right;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
    </header>

    <div class="main-grid">
        <div class="col" id="col-0">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="moveSection(this, -1)">⬅️左移</button>
                    <button class="btn-edit" onclick="moveSection(this, 1)">➡️右移</button>
                    <button class="btn-edit" onclick="changeColor(this)">🎨顏色</button>
                    <button class="btn-edit" onclick="changeFontSize(this, 1)">➕字</button>
                    <button class="btn-edit" onclick="changeFontSize(this, -1)">➖字</button>
                    <button class="btn-edit" onclick="addRow(this, 4)">➕漢堡行</button>
                    <button class="btn-edit btn-del-sec" onclick="this.closest('.section').remove()">✕ 刪除區塊</button>
                </div>
                <div class="section-title" contenteditable="true">漢堡 / 吐司 / 軟法 / 總匯</div>
                <table>
                    <tbody>
                        <tr>
                            <td contenteditable="true">煎蛋</td>
                            <td class="price-col">
                                <div class="price-box"><span class="label-top" contenteditable="true">吐司</span><div><span class="box-square"></span><span contenteditable="true">30</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">漢堡</span><div><span class="box-square"></span><span contenteditable="true">35</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">軟法</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">總匯</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                                <button class="btn-edit no-print" style="background:#ff7675;color:#fff" onclick="this.closest('tr').remove()">✕</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col" id="col-1"></div>
        <div class="col" id="col-2"></div>
    </div>

    <footer contenteditable="true">
        加起司+10 | 吐司漢堡均加蛋，不加蛋折5 | 餐點現做請耐心等候，謝謝您
    </footer>
</div>

<script>
    // 自動載入
    window.onload = function() {
        const saved = localStorage.getItem('masterMenuData');
        if (saved) document.getElementById('menu-content').innerHTML = saved;
    };

    function saveMenu() {
        localStorage.setItem('masterMenuData', document.getElementById('menu-content').innerHTML);
        alert('✅ 菜單已存檔！');
    }

    function resetMenu() {
        if(confirm('確定重置嗎？')) { localStorage.removeItem('masterMenuData'); location.reload(); }
    }

    // 新增完整區塊
    function addNewSection() {
        const target = document.getElementById('col-0');
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `
            <div class="controls no-print">
                <button class="btn-edit" onclick="moveSection(this, -1)">⬅️</button>
                <button class="btn-edit" onclick="moveSection(this, 1)">➡️</button>
                <button class="btn-edit" onclick="changeColor(this)">🎨</button>
                <button class="btn-edit" onclick="changeFontSize(this, 1)">➕字</button>
                <button class="btn-edit" onclick="addRow(this, 1)">➕單價行</button>
                <button class="btn-edit btn-del-sec" onclick="this.closest('.section').remove()">✕</button>
            </div>
            <div class="section-title" contenteditable="true">新類別名稱</div>
            <table><tbody>
                <tr>
                    <td contenteditable="true">品項名</td>
                    <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span>
                    <button class="btn-edit no-print" onclick="this.closest('tr').remove()">✕</button></td>
                </tr>
            </tbody></table>`;
        target.appendChild(div);
    }

    // 新增行
    function addRow(btn, type) {
        const tbody = btn.closest('.section').querySelector('tbody');
        const tr = document.createElement('tr');
        if(type === 4) {
            tr.innerHTML = `
                <td contenteditable="true">新漢堡</td>
                <td class="price-col">
                    <div class="price-box"><div><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                    <div class="price-box"><div><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                    <div class="price-box"><div><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                    <div class="price-box"><div><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                    <button class="btn-edit no-print" onclick="this.closest('tr').remove()">✕</button>
                </td>`;
        } else {
            tr.innerHTML = `
                <td contenteditable="true">新品項</td>
                <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span>
                <button class="btn-edit no-print" onclick="this.closest('tr').remove()">✕</button></td>`;
        }
        tbody.appendChild(tr);
    }

    // 移動區塊 (滑動功能)
    function moveSection(btn, dir) {
        const sec = btn.closest('.section');
        const col = sec.parentElement;
        const colId = parseInt(col.id.replace('col-', ''));
        const nextColId = (colId + dir + 3) % 3;
        document.getElementById('col-' + nextColId).appendChild(sec);
    }

    // 調整顏色
    function changeColor(btn) {
        const title = btn.closest('.section').querySelector('.section-title');
        const newColor = prompt("輸入顏色 (例如: red, blue, green, #ff5500):", "black");
        if(newColor) title.style.backgroundColor = newColor;
    }

    // 調整字體大小
    function changeFontSize(btn, delta) {
        const table = btn.closest('.section').querySelector('table');
        let curSize = parseFloat(window.getComputedStyle(table).fontSize);
        table.style.fontSize = (curSize + delta) + "px";
    }
</script>

</body>
</html>
