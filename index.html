<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 旗艦精省版編輯器</title>
    <style id="font-style">body { font-family: "Microsoft JhengHei", sans-serif; }</style>
    <style>
        @media print {
            .no-print, .controls, .toolbar { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 10mm !important; }
            .section { page-break-inside: avoid; border: 1px solid #000 !important; }
        }

        body { background: #dfe6e9; margin: 0; padding: 20px; color: #000; transition: all 0.2s; }
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 8px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }
        .btn-add-custom { background: #f1c40f; color: #000; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 5mm 8mm; box-sizing: border-box; border: 1px solid #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        
        header { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 5px; }
        .header-info-bar { display: flex; justify-content: space-between; border: 1px solid #000; padding: 3px 10px; font-weight: bold; font-size: 13px; }
        .underline { border-bottom: 1px solid #000; min-width: 40px; display: inline-block; text-align: center; margin: 0 5px; outline: none; }

        .main-grid { display: grid; grid-template-columns: 1.15fr 0.9fr 0.95fr; gap: 10px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; gap: 8px; min-height: 100px; }

        .section { border: 1px solid #000; border-radius: 2px; overflow: hidden; position: relative; background: #fff; }
        .section-title { background: #000; color: #fff; padding: 4px; font-weight: bold; text-align: center; font-size: 13px; }
        
        .price-align-header { display: flex; align-items: center; padding: 2px 5px; border-bottom: 1px solid #000; background-color: #f2f2f2 !important; font-weight: bold; }
        .category-name { flex-grow: 1; font-size: 10px; }
        .cell-width { width: 36px; text-align: center; font-size: 9px; }

        .controls { background: #eee; padding: 2px; display: flex; gap: 2px; border-bottom: 1px solid #ccc; flex-wrap: wrap; justify-content: center; }
        .btn-move { background: #636e72; color: white; font-size: 10px; padding: 1px 3px; border: none; cursor: pointer; border-radius: 2px; }
        .btn-edit { font-size: 10px; padding: 1px 4px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 2px; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        td { border-bottom: 1px solid #f0f0f0; padding: 3px 2px; vertical-align: middle; }
        .box-square { width: 11px; height: 11px; border: 1px solid #000; display: inline-block; vertical-align: middle; margin-right: 1px; }
        .price-align-row { display: flex; justify-content: flex-end; align-items: center; }
        .box-cell { width: 36px; text-align: center; }

        /* 黃色客製框 - 空間壓縮版 */
        .custom-box { background: #fff9c4 !important; border: 1.5px solid #000; border-radius: 8px; padding: 5px 8px; }
        .custom-title { color: #d32f2f; font-weight: bold; text-align: center; font-size: 12px; margin-bottom: 2px; border-bottom: 1px dashed #d32f2f; }
        .custom-content { display: flex; flex-direction: column; gap: 3px; }
        .custom-row { display: flex; flex-wrap: wrap; align-items: center; font-size: 10px; gap: 5px; }
        .option-item { display: inline-flex; align-items: center; white-space: nowrap; margin-right: 2px; }

        footer { border-top: 2px solid #000; padding-top: 5px; margin-top: auto; font-size: 11px; text-align: center; font-weight: bold; }
        .del-x { color: red; border: none; background: none; cursor: pointer; font-weight: bold; margin-right: 2px; font-size: 12px; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 類別</button>
    <button class="btn btn-add-custom" onclick="addYellowBox()">➕ 黃色框</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 列印</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="font-size:22px; font-weight:bold;" contenteditable="true">美天早餐 點菜單</div>
            <div style="font-size:10px;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
        </div>
        <div class="header-info-bar">
            <div>內用桌號：<span class="underline" contenteditable="true"></span></div>
            <div><span class="box-square"></span> 外帶</div>
            <div>金額：<span class="underline" contenteditable="true"></span> 元</div>
        </div>
    </header>

    <div class="main-grid" id="main-grid">
        <div class="col" id="col-0">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button>
                    <button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button>
                    <button class="btn-edit" onclick="pickColor(this,'.section-title')">🎨色</button>
                    <button class="btn-edit" onclick="changeFontSize(this, 1)">➕大</button><button class="btn-edit" onclick="changeFontSize(this, -1)">➖小</button>
                    <button class="btn-edit" onclick="addRow(this,4)">➕4價</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="section-title" contenteditable="true">漢堡 / 吐司 / 軟法 / 總匯</div>
                <div class="price-align-header"><div class="category-name">品項名稱</div><div class="label-group"><div class="cell-width">吐司</div><div class="cell-width">漢堡</div><div class="cell-width">軟法</div><div class="cell-width">總匯</div></div></div>
                <table><tbody><tr><td><span contenteditable="true">煎蛋</span></td><td class="price-align-row"><div class="box-cell"><span class="box-square"></span>30</div><div class="box-cell"><span class="box-square"></span>35</div><div class="box-cell"><span class="box-square"></span>50</div><div class="box-cell"><span class="box-square"></span>50</div></td></tr></tbody></table>
            </div>
        </div>
        <div class="col" id="col-1"></div>
        <div class="col" id="col-2">
            <div class="section custom-box">
                <div class="controls no-print">
                    <button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button>
                    <button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button>
                    <button class="btn-edit" onclick="changeFontSize(this, -1)">➖更小</button>
                    <button class="btn-edit" onclick="addCustomOption(this, 1)">➕吐司項</button><button class="btn-edit" onclick="addCustomOption(this, 2)">➕漢堡項</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="custom-title" contenteditable="true">不加請打勾</div>
                <div class="custom-content">
                    <div class="custom-row" id="toast-options"><b contenteditable="true">吐司:</b></div>
                    <div class="custom-row" id="burger-options"><b contenteditable="true">漢堡:</b></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const saved = localStorage.getItem('breakfast_mini_v5');
        if (saved) document.getElementById('menu-content').innerHTML = saved;
    };

    function saveMenu() {
        localStorage.setItem('breakfast_mini_v5', document.getElementById('menu-content').innerHTML);
        alert('✅ 已儲存！');
    }

    function changeFontSize(btn, delta) {
        const section = btn.closest('.section');
        const elements = section.querySelectorAll('table, .section-title, .custom-title, .price-align-header, td, span, div, b');
        elements.forEach(el => {
            const curSize = parseFloat(window.getComputedStyle(el).fontSize);
            if(curSize) el.style.fontSize = (curSize + delta) + 'px';
        });
    }

    function move(btn, dir) {
        const sec = btn.closest('.section');
        const col = sec.parentElement;
        const colId = parseInt(col.id.replace('col-', ''));
        if (dir === 'up' && sec.previousElementSibling) col.insertBefore(sec, sec.previousElementSibling);
        else if (dir === 'down' && sec.nextElementSibling) col.insertBefore(sec.nextElementSibling, sec);
        else if (dir === 'left') document.getElementById('col-' + ((colId + 2) % 3)).appendChild(sec);
        else if (dir === 'right') document.getElementById('col-' + ((colId + 1) % 3)).appendChild(sec);
    }

    function addCustomOption(btn, type) {
        const section = btn.closest('.section');
        const target = (type === 1) ? section.querySelector('#toast-options') : section.querySelector('#burger-options');
        const span = document.createElement('span');
        span.className = 'option-item';
        span.innerHTML = `<button class="no-print del-x" onclick="this.parentElement.remove()">✕</button><span class="box-square"></span><span contenteditable="true">選項</span>`;
        target.appendChild(span);
    }

    function addRow(btn, count) {
        const tbody = btn.closest('.section').querySelector('tbody');
        const tr = document.createElement('tr');
        let cells = '';
        for(let i=0; i<count; i++) cells += `<div class="box-cell"><span class="box-square"></span><span contenteditable="true">0</span></div>`;
        tr.innerHTML = `<td><span contenteditable="true">新項目</span></td><td class="price-align-row">${cells}</td>`;
        tbody.appendChild(tr);
    }

    function addNewSection() {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `<div class="controls no-print"><button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button><button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button><button class="btn-edit" onclick="changeFontSize(this, -1)">➖</button><button class="btn-edit" onclick="addRow(this, 1)">➕1價</button><button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button></div><div class="section-title" contenteditable="true">新類別</div><table><tbody></tbody></table>`;
        document.getElementById('col-0').appendChild(div);
        addRow(div.querySelector('.btn-edit'), 1);
    }

    function addYellowBox() {
        const div = document.createElement('div');
        div.className = 'section custom-box';
        div.innerHTML = `<div class="controls no-print"><button class="btn-move" onclick="move(this,'up')">⬆️</button><button class="btn-move" onclick="move(this,'down')">⬇️</button><button class="btn-move" onclick="move(this,'left')">⬅️</button><button class="btn-move" onclick="move(this,'right')">➡️</button><button class="btn-edit" onclick="changeFontSize(this, -1)">➖</button><button class="btn-edit" onclick="addCustomOption(this, 1)">➕吐司項</button><button class="btn-edit" onclick="addCustomOption(this, 2)">➕漢堡項</button><button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button></div><div class="custom-title" contenteditable="true">不加請打勾</div><div class="custom-content"><div class="custom-row" id="toast-options"><b>吐司:</b></div><div class="custom-row" id="burger-options"><b>漢堡:</b></div></div>`;
        document.getElementById('col-2').appendChild(div);
    }
</script>
</body>
</html>
