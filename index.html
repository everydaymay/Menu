<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 自由極簡版編輯器</title>
    <style id="font-style">body { font-family: "Microsoft JhengHei", sans-serif; }</style>
    <style>
        @media print {
            .no-print, .controls, .toolbar, .del-cell { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 8mm !important; }
            .section { page-break-inside: avoid; border: 1px solid #000 !important; overflow: visible !important; resize: none !important; }
            table { border-collapse: collapse !important; border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; }
        }

        body { background: #dfe6e9; margin: 0; padding: 20px; color: #000; }
        .toolbar { background: #2d3436; color: #fff; padding: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 8px; align-items: center; justify-content: center; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #0984e3; color: white; }
        .btn-print { background: #00b894; color: white; }
        .btn-add-sec { background: #6c5ce7; color: white; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 8mm 10mm; box-sizing: border-box; border: 1px solid #ccc; display: flex; flex-direction: column; }
        
        header { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px; }
        .header-info-bar { display: flex; justify-content: space-between; border: 1px solid #000; padding: 5px 10px; font-weight: bold; font-size: 14px; }
        .underline { border-bottom: 1px solid #000; min-width: 45px; display: inline-block; text-align: center; margin: 0 5px; outline: none; }

        .main-grid { display: grid; grid-template-columns: 1.15fr 0.9fr 0.95fr; gap: 10px; flex-grow: 1; }
        .col { display: flex; flex-direction: column; gap: 10px; }

        .section { border: 1px solid #000; margin-bottom: 10px; position: relative; background: #fff; resize: both; overflow: auto; min-width: 150px; }
        .section-title { background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; font-size: 14px; }
        .price-align-header { background: #f2f2f2; border-bottom: 1px solid #000; padding: 4px 10px; font-size: 11px; font-weight: bold; min-height: 1.2em; display: flex; align-items: center; }

        .controls { background: #eee; padding: 4px; display: flex; gap: 2px; border-bottom: 1px solid #ccc; flex-wrap: wrap; justify-content: center; }
        .btn-edit { font-size: 10px; padding: 2px 4px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; border: 1px solid #000; }
        td { border: 1px solid #000; padding: 4px 2px; vertical-align: middle; text-align: center; position: relative; }
        .item-name-td { width: 40%; text-align: left; padding-left: 5px; }
        
        .box-square { width: 12px; height: 12px; border: 1px solid #000; display: inline-block; vertical-align: middle; margin-right: 2px; }
        .del-x { color: red; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 12px; }
        .del-cell { position: absolute; top: 0; right: 0; color: #ccc; font-size: 8px; cursor: pointer; padding: 2px; }
        .del-cell:hover { color: red; }

        .custom-box { background: #fff9c4; border: 1px solid #000; border-radius: 10px; padding: 8px; }
        footer { border-top: 2px solid #000; padding-top: 8px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-add-sec" onclick="addNewSection()">➕ 新增一般區塊</button>
    <button class="btn btn-save" onclick="saveMenu()">💾 儲存存檔</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 直接列印</button>
</div>

<div class="a4-container" id="menu-content">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="font-size:24px; font-weight:bold;" contenteditable="true">美天早餐 點菜單</div>
            <div style="font-size:11px;" contenteditable="true">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
        </div>
        <div class="header-info-bar">
            <div>內用桌號：<span class="underline" contenteditable="true"></span></div>
            <div><span class="box-square"></span> 外帶</div>
            <div>金額：<span class="underline" contenteditable="true"></span> 元</div>
        </div>
    </header>

    <div class="main-grid" id="main-grid">
        <div class="col" id="col-0">
            <div class="section">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="pickColor(this,'.section-title')">🎨主標</button>
                    <button class="btn-edit" onclick="pickColor(this,'.price-align-header')">🎨子標</button>
                    <button class="btn-edit" onclick="changeFontSize(this, 1)">➕大</button>
                    <button class="btn-edit" onclick="changeFontSize(this, -1)">➖小</button>
                    <button class="btn-edit" onclick="setColumns(this, 4)">➕4價</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="section-title" contenteditable="true">漢堡 / 吐司 / 軟法 / 總匯</div>
                <div class="price-align-header">
                    <button class="no-print del-x" onclick="this.parentElement.remove()">✕</button>
                    <div contenteditable="true" style="flex-grow: 1;">品項名稱　　　　　　　吐司　漢堡　軟法　總匯</div>
                </div>
                <table>
                    <tbody>
                        <tr>
                            <td class="item-name-td"><button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">範例品項</span></td>
                            <td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>
                            <td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>
                            <td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>
                            <td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>
                        </tr>
                    </tbody>
                </table>
                <button class="btn-edit no-print" style="width:100%; border:none;" onclick="addRow(this)">➕ 新增一行</button>
            </div>
        </div>
        <div class="col" id="col-1"></div>
        <div class="col" id="col-2">
            <div class="section custom-box">
                <div class="controls no-print">
                    <button class="btn-edit" onclick="changeFontSize(this, -1)">➖小</button>
                    <button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button>
                </div>
                <div class="custom-title" contenteditable="true">不加請打勾</div>
                <div style="font-size:11px; display:flex; justify-content:space-around;" contenteditable="true">
                    <div>吐司：沙拉 小黃瓜 胡椒粉</div>
                    <div>漢堡：沙拉 生菜 洋蔥 番茄醬 番茄片 胡椒粉</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const saved = localStorage.getItem('breakfast_clean_v15');
        if (saved) document.getElementById('menu-content').innerHTML = saved;
    };

    function saveMenu() {
        localStorage.setItem('breakfast_clean_v15', document.getElementById('menu-content').innerHTML);
        alert('✅ 儲存成功！');
    }

    function changeFontSize(btn, delta) {
        const section = btn.closest('.section');
        const all = section.querySelectorAll('table, td, .price-align-header, .section-title, span, div');
        all.forEach(el => {
            const cur = parseFloat(window.getComputedStyle(el).fontSize);
            if(cur) el.style.fontSize = (cur + delta) + 'px';
        });
    }

    function pickColor(btn, selector) {
        const target = btn.closest('.section').querySelector(selector);
        const color = prompt("請輸入顏色 (例如: pink, #f2f2f2, white):", selector.includes('title') ? "black" : "#f2f2f2");
        if (color) {
            target.style.setProperty('background-color', color, 'important');
            if(selector === '.section-title') target.style.color = (color === 'white' || color === '#ffffff') ? 'black' : 'white';
        }
    }

    function move(btn, dir) {
        const sec = btn.closest('.section');
        const colId = parseInt(sec.parentElement.id.replace('col-', ''));
        if (dir === 'up' && sec.previousElementSibling) sec.parentElement.insertBefore(sec, sec.previousElementSibling);
        else if (dir === 'down' && sec.nextElementSibling) sec.parentElement.insertBefore(sec.nextElementSibling, sec);
        else if (dir === 'left') document.getElementById('col-' + ((colId + 2) % 3)).appendChild(sec);
        else if (dir === 'right') document.getElementById('col-' + ((colId + 1) % 3)).appendChild(sec);
    }

    function setColumns(btn, count) {
        const section = btn.closest('.section');
        const table = section.querySelector('table');
        table.dataset.cols = count;
        table.querySelector('tbody').innerHTML = ''; 
        addRow(btn);
    }

    function addRow(btn) {
        const section = btn.closest('.section');
        const table = section.querySelector('table');
        const count = parseInt(table.dataset.cols || 1);
        const tr = document.createElement('tr');
        let html = `<td class="item-name-td"><button class="no-print del-x" onclick="this.closest('tr').remove()">✕</button><span contenteditable="true">品項</span></td>`;
        for(let i=0; i<count; i++) {
            html += `<td><span class="no-print del-cell" onclick="this.parentElement.remove()">x</span><span class="box-square"></span><span contenteditable="true">0</span></td>`;
        }
        tr.innerHTML = html;
        table.querySelector('tbody').appendChild(tr);
    }

    function addNewSection() {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `<div class="controls no-print"><button class="btn-edit" onclick="pickColor(this,'.section-title')">🎨主</button><button class="btn-edit" onclick="pickColor(this,'.price-align-header')">🎨子</button><button class="btn-edit" onclick="changeFontSize(this, 1)">➕</button><button class="btn-edit" onclick="changeFontSize(this, -1)">➖</button><button class="btn-edit" onclick="setColumns(this, 1)">➕1價</button><button class="btn-edit" onclick="setColumns(this, 2)">➕2價</button><button class="btn-edit" onclick="setColumns(this, 4)">➕4價</button><button class="btn-edit" style="color:red" onclick="this.closest('.section').remove()">✕</button></div><div class="section-title" contenteditable="true">新類別</div><div class="price-align-header"><button class="no-print del-x" onclick="this.parentElement.remove()">✕</button><div contenteditable="true" style="flex-grow: 1;">品項名稱　單價</div></div><table data-cols="1"><tbody></tbody></table><button class="btn-edit no-print" style="width:100%; border:none;" onclick="addRow(this)">➕ 新增一行</button>`;
        document.getElementById('col-0').appendChild(div);
        addRow(div.querySelector('.btn-edit'));
    }
</script>
</body>
</html>
