<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美天早餐 - 自助菜單編輯器</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 0; background: #fff; }
            .a4-container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 5mm 10mm !important; }
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f0f0; margin: 0; padding: 20px; color: #000; }
        
        /* 頂部工具列 */
        .toolbar { background: #333; color: #fff; padding: 10px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-print { background: #27ae60; color: white; }
        
        /* 編輯小按鈕 */
        .btn-edit { width: 22px; height: 22px; border-radius: 50%; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 14px; line-height: 1; margin-right: 5px; vertical-align: middle; }
        .add-row-btn { background: #2980b9; }
        .del-row-btn { background: #e74c3c; font-size: 10px; }

        .a4-container { width: 210mm; min-height: 297mm; background: #fff; margin: 60px auto; padding: 5mm 10mm; box-sizing: border-box; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 10px; flex-grow: 1; }
        
        .section { border: 1px solid #000; margin-bottom: 10px; position: relative; }
        .section-title { background: #000; color: #fff; padding: 5px; font-weight: bold; text-align: center; }
        .section-title button { float: left; } /* 新增按鈕放在標題左側 */

        table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
        td { border-bottom: 0.5px solid #eee; padding: 4px 2px; }
        .editable:focus { background: #ffffcc; outline: 1px solid #2980b9; }

        /* 標籤對齊邏輯 */
        .price-col { display: flex; justify-content: flex-end; align-items: flex-end; gap: 2px; }
        .price-box { width: 36px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .box-square { width: 12px; height: 12px; border: 1px solid #000; display: inline-block; margin-right: 2px; }
        .label-top { font-size: 9px; font-weight: bold; margin-bottom: 2px; height: 12px; }

        footer { border-top: 2px solid #000; padding-top: 10px; margin-top: auto; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="toolbar no-print">
    <button class="btn btn-print" onclick="window.print()">點此列印 (列印時會自動隱藏按鈕)</button>
    <span style="font-size: 12px; margin-left: 10px;">點擊文字即可修改內容</span>
</div>

<div class="a4-container">
    <header>
        <h1 contenteditable="true" class="editable">美天早餐 點菜單</h1>
        <div style="font-size: 11px; text-align: right;" contenteditable="true" class="editable">📞 02-2270-3918 | 📍 土城區延吉街53號</div>
    </header>

    <div class="main-grid">
        <div class="col">
            <div class="section">
                <div class="section-title">
                    <button class="btn-edit add-row-btn no-print" onclick="addBurgerRow('burger-body')">+</button>
                    漢堡 / 吐司 / 軟法 / 總匯
                </div>
                <table id="burger-table">
                    <tbody id="burger-body">
                        <tr>
                            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true" class="editable">煎蛋</span></td>
                            <td class="price-col">
                                <div class="price-box"><span class="label-top" contenteditable="true">吐司</span><div><span class="box-square"></span><span contenteditable="true">30</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">漢堡</span><div><span class="box-square"></span><span contenteditable="true">35</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">軟法</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">總匯</span><div><span class="box-square"></span><span contenteditable="true">50</span></div></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col">
            <div class="section">
                <div class="section-title">
                    <button class="btn-edit add-row-btn no-print" onclick="addSingleRow('egg-body')">+</button>
                    蛋餅系列 (☐醬油 ☐辣椒)
                </div>
                <table>
                    <tbody id="egg-body">
                        <tr>
                            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">原味</span></td>
                            <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">30</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col">
            <div class="section">
                <div class="section-title">
                    <button class="btn-edit add-row-btn no-print" onclick="addDrinkRow('drink-body')">+</button>
                    飲料系列 (☐冰 ☐溫 ☐熱)
                </div>
                <table>
                    <tbody id="drink-body">
                        <tr>
                            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">紅茶</span></td>
                            <td class="price-col">
                                <div class="price-box"><span class="label-top" contenteditable="true">中</span><div><span class="box-square"></span><span contenteditable="true">15</span></div></div>
                                <div class="price-box"><span class="label-top" contenteditable="true">大</span><div><span class="box-square"></span><span contenteditable="true">20</span></div></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="section">
                <div class="section-title">
                    <button class="btn-edit add-row-btn no-print" onclick="addSingleRow('snack-body')">+</button>
                    炸物小點 (☐胡椒 ☐番茄醬)
                </div>
                <table>
                    <tbody id="snack-body">
                        <tr>
                            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">雞塊 / 薯條</span></td>
                            <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">40</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer contenteditable="true">
        加起司+10 | 吐司漢堡均加蛋，不加蛋折5 | 餐點現做請耐心等候，謝謝您
    </footer>
</div>

<script>
    // 新增漢堡區(4格價格)
    function addBurgerRow(id) {
        const body = document.getElementById(id);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">新品項</span></td>
            <td class="price-col">
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
            </td>`;
        body.appendChild(tr);
    }

    // 新增普通單價區
    function addSingleRow(id) {
        const body = document.getElementById(id);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">新品項</span></td>
            <td style="text-align:right;"><span class="box-square"></span><span contenteditable="true">0</span></td>`;
        body.appendChild(tr);
    }

    // 新增飲料區(2格價格)
    function addDrinkRow(id) {
        const body = document.getElementById(id);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><button class="btn-edit del-row-btn no-print" onclick="this.closest('tr').remove()">X</button><span contenteditable="true">新飲料</span></td>
            <td class="price-col">
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
                <div class="price-box"><div class="price-val"><span class="box-square"></span><span contenteditable="true">0</span></div></div>
            </td>`;
        body.appendChild(tr);
    }
</script>

</body>
</html>
